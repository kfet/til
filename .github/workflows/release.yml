name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install uv
        run: python -m pip install uv

      - name: Guard release version
        uses: kfet/gha/release-guard@4c729c719a3c76fbfa85c26722f0bd1ab63216ba

      - name: Run tests
        run: python -m unittest test_til.py

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists"
          else
            gh release create "$TAG" \
              --title "til ${TAG#v}" \
              --generate-notes
          fi

      # ---- Homebrew tap update --------------------------------------------
      # Renders Formula/til.rb from homebrew/til.rb.template, then commits and
      # pushes it to github.com/kfet/homebrew-til. Requires a repo secret
      # HOMEBREW_TAP_TOKEN with contents:write on the tap repo.
      - name: Render Homebrew formula
        run: |
          mkdir -p tap/Formula
          scripts/render-homebrew-formula.sh \
            "${GITHUB_REF_NAME#v}" \
            tap/Formula/til.rb
          cat tap/Formula/til.rb

      - name: Push to homebrew-til tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set; skipping tap update"
            exit 0
          fi

          ver="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT

          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/kfet/homebrew-til.git" \
            "$tmp/tap"
          mkdir -p "$tmp/tap/Formula"
          cp tap/Formula/til.rb "$tmp/tap/Formula/til.rb"

          cd "$tmp/tap"
          git config user.name "til-release[bot]"
          git config user.email "til-release@users.noreply.github.com"
          git add Formula/til.rb
          if git diff --cached --quiet; then
            echo "tap already up to date"
            exit 0
          fi
          git commit -m "til: update to v${ver}"
          git push origin HEAD
